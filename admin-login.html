<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Login — A ONE Hair Salon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080a;
  --bg1:#0f0f12;
  --bg2:#141418;
  --gold:#c9a84c;
  --gold-lt:#d4aa50;
  --gold-dk:#b8973a;
  --white:#f5f0e8;
  --muted:#6b6860;
  --border:rgba(201,168,76,.13);
  --serif:'Georgia',serif;
  --sans:'Helvetica Neue',Arial,sans-serif;
}
html,body{height:100%;background:var(--bg);font-family:var(--sans);color:var(--white);overflow:hidden}

/* ── Background particles ── */
canvas#particles{position:fixed;inset:0;z-index:0;opacity:.35}

/* ── Decorative lines ── */
.deco-line{position:fixed;background:linear-gradient(to bottom,transparent,var(--gold),transparent);width:1px;opacity:.18;z-index:1}
.deco-line.l1{left:15%;top:0;height:100%}
.deco-line.l2{right:15%;top:0;height:100%}
.deco-line.h1{position:fixed;top:15%;left:0;width:100%;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:.1}
.deco-line.h2{position:fixed;bottom:15%;left:0;width:100%;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:.1}

/* ── Main wrap ── */
.login-wrap{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}

/* ── Card ── */
.login-card{
  width:100%;max-width:420px;
  background:rgba(15,15,18,.92);
  border:1px solid var(--border);
  border-radius:2px;
  padding:52px 44px 44px;
  position:relative;
  backdrop-filter:blur(20px);
  box-shadow:0 32px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(201,168,76,.08);
  animation:cardIn .6s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* Corner accents */
.login-card::before,.login-card::after{
  content:'';position:absolute;width:18px;height:18px;
  border-color:var(--gold-dk);border-style:solid;
  opacity:.5;
}
.login-card::before{top:14px;left:14px;border-width:1px 0 0 1px}
.login-card::after{bottom:14px;right:14px;border-width:0 1px 1px 0}

/* ── Logo ── */
.login-logo{text-align:center;margin-bottom:40px}
.login-logo-icon{
  width:54px;height:54px;
  background:linear-gradient(135deg,var(--gold-lt),var(--gold),var(--gold-dk));
  border-radius:50%;margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;color:var(--bg);
  box-shadow:0 0 28px rgba(201,168,76,.3);
}
.login-logo-name{
  font-family:var(--serif);font-size:1.6rem;font-weight:300;
  letter-spacing:.35em;color:var(--white);text-transform:uppercase;
  margin-bottom:4px;
}
.login-logo-sub{
  font-size:.65rem;letter-spacing:.28em;color:var(--gold);
  text-transform:uppercase;
}
.login-logo-divider{
  width:40px;height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  margin:14px auto 0;
}

/* ── Form ── */
.form-group{margin-bottom:20px}
.form-group label{
  display:block;font-size:.68rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--gold);
  margin-bottom:8px;
}
.form-group input{
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(201,168,76,.2);
  border-radius:2px;
  padding:13px 16px;
  color:var(--white);
  font-size:.9rem;
  font-family:var(--sans);
  transition:border-color .25s,box-shadow .25s;
  outline:none;
}
.form-group input::placeholder{color:rgba(245,240,232,.25)}
.form-group input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(201,168,76,.08);
}

/* ── Password toggle ── */
.pass-wrap{position:relative}
.pass-wrap input{padding-right:44px}
.pass-toggle{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--muted);font-size:.85rem;padding:4px;
  transition:color .2s;
}
.pass-toggle:hover{color:var(--gold)}

/* ── Error ── */
.login-error{
  display:none;
  background:rgba(220,60,60,.1);
  border:1px solid rgba(220,60,60,.3);
  border-radius:2px;
  padding:10px 14px;
  font-size:.8rem;
  color:#e88;
  margin-bottom:20px;
  text-align:center;
  animation:shake .4s;
}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── Submit btn ── */
.btn-signin{
  width:100%;
  background:linear-gradient(135deg,var(--gold-lt),var(--gold),var(--gold-dk));
  color:var(--bg);
  border:none;border-radius:2px;
  padding:14px;
  font-size:.8rem;letter-spacing:.2em;
  text-transform:uppercase;font-weight:600;
  font-family:var(--sans);
  cursor:pointer;
  transition:opacity .25s,transform .15s,box-shadow .25s;
  margin-top:8px;
}
.btn-signin:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.25)}
.btn-signin:active{transform:translateY(0)}
.btn-signin:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── Loading spinner ── */
.btn-signin.loading::after{
  content:'';display:inline-block;
  width:14px;height:14px;
  border:2px solid rgba(8,8,10,.4);
  border-top-color:var(--bg);
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin-left:10px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Footer note ── */
.login-note{
  text-align:center;margin-top:28px;
  font-size:.65rem;letter-spacing:.1em;color:var(--muted);
  text-transform:uppercase;
}

/* ── Responsive ── */
@media(max-width:480px){
  .login-card{padding:40px 28px 36px}
  .login-logo-name{font-size:1.35rem}
}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="deco-line l1"></div>
<div class="deco-line l2"></div>
<div class="deco-line h1"></div>
<div class="deco-line h2"></div>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-icon">✦</div>
      <div class="login-logo-name">A ONE</div>
      <div class="login-logo-sub">Hair Salon · Admin Panel</div>
      <div class="login-logo-divider"></div>
    </div>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label for="loginUser">Username</label>
        <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username" spellcheck="false">
      </div>
      <div class="form-group">
        <label for="loginPass">Password</label>
        <div class="pass-wrap">
          <input type="password" id="loginPass" placeholder="••••••••••" autocomplete="current-password">
          <button type="button" class="pass-toggle" id="passToggle" title="Show/hide password">👁</button>
        </div>
      </div>

      <div class="login-error" id="loginError">Invalid username or password. Please try again.</div>

      <button type="submit" class="btn-signin" id="signinBtn">Sign In</button>
    </form>

    <div class="login-note">A ONE Hair Salon · Secure Admin Access</div>
  </div>
</div>

<script>
/* ── Default credentials (SHA-256 hashed) ── */
const DEFAULT_USER = 'Umang680';
const DEFAULT_HASH = '3436d6da21557f8ba6248b58cc68b9f658862a71a9c8eed620491b44e7689194';
const SESSION_KEY  = 'aone_admin_token';
const CREDS_KEY    = 'aone_admin_creds';

/* ── If already logged in, skip straight to admin ── */
if (sessionStorage.getItem(SESSION_KEY)) {
  window.location.replace('admin.html');
}

/* ── SHA-256 via Web Crypto API ── */
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

/* ── Password visibility toggle ── */
const passInput = document.getElementById('loginPass');
document.getElementById('passToggle').addEventListener('click', () => {
  passInput.type = passInput.type === 'password' ? 'text' : 'password';
});

/* ── Login form submit ── */
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn   = document.getElementById('signinBtn');
  const errEl = document.getElementById('loginError');
  const user  = document.getElementById('loginUser').value.trim();
  const pass  = document.getElementById('loginPass').value;

  errEl.style.display = 'none';
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = 'Signing in';

  try {
    /* Get stored credentials or use defaults */
    const stored    = JSON.parse(localStorage.getItem(CREDS_KEY) || 'null');
    const validUser = stored ? stored.username : DEFAULT_USER;
    const validHash = stored ? stored.password_hash : DEFAULT_HASH;

    const enteredHash = await sha256(pass);

    if (user === validUser && enteredHash === validHash) {
      /* ── Success: create session token ── */
      const token = btoa(String(Date.now()) + ':' + Math.random().toString(36));
      sessionStorage.setItem(SESSION_KEY, token);
      sessionStorage.setItem('aone_admin_user', user);

      btn.textContent = '✓ Welcome back';
      btn.style.background = 'linear-gradient(135deg,#4caf77,#3d9460)';
      setTimeout(() => window.location.replace('admin.html'), 600);
    } else {
      /* ── Failure ── */
      errEl.style.display = 'block';
      errEl.style.animation = 'none';
      void errEl.offsetWidth;
      errEl.style.animation = '';
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.textContent = 'Sign In';
      document.getElementById('loginPass').value = '';
      document.getElementById('loginPass').focus();
    }
  } catch(err) {
    errEl.textContent = 'An error occurred. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = 'Sign In';
  }
});

/* ── Particle background ── */
(function(){
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');
  let W, H, particles;

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function Particle(){
    this.reset = function(){
      this.x  = Math.random() * W;
      this.y  = Math.random() * H;
      this.vx = (Math.random() - .5) * .3;
      this.vy = (Math.random() - .5) * .3;
      this.r  = Math.random() * 1.2 + .3;
      this.a  = Math.random() * .5 + .1;
    };
    this.reset();
  }
  particles = Array.from({length:60}, () => new Particle());

  function draw(){
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x<0||p.x>W||p.y<0||p.y>H) p.reset();
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(201,168,76,${p.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
